<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Active Score Display</title>
    <style>
        body { margin: 0; height: 100vh; background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; text-align: center; }
        
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.8s ease-in-out; }
        
        #idleScreen { opacity: 1; z-index: 10; }
        .logo-text { font-size: 8vw; color: #2d3436; letter-spacing: 15px; margin: 0; text-transform: uppercase; font-weight: 900;}
        .waiting-text { font-size: 2vw; color: #636e72; text-transform: uppercase; letter-spacing: 5px; margin-top: 20px;}
        
        #scoreScreen { opacity: 0; z-index: 5; } 
        #roundDisplay { font-size: 4vw; color: #8395a7; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 20px;}
        #teamDisplay { font-size: 8vw; font-weight: bold; color: #ff9f43; margin-bottom: 40px; text-transform: uppercase;}
        
        /* Time display renamed to scoreDisplay in styling */
        #scoreDisplay { font-size: 15vw; font-weight: bold; color: #00d2d3; text-shadow: 0 0 30px rgba(0, 210, 211, 0.5); line-height: 1;}
    </style>
</head>
<body>

    <div id="idleScreen" class="screen">
        <h1 class="logo-text">Aero Rage</h1>
        <div class="waiting-text">Awaiting Next Run...</div>
    </div>

    <div id="scoreScreen" class="screen">
        <div id="roundDisplay">Waiting...</div>
        <div id="teamDisplay">TEAM NAME</div>
        <div id="scoreDisplay">0 PTS</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDzxvAi2DksFoVxtr5FMTJ7NQ4C10rgyDM",
            authDomain: "aero-rage.firebaseapp.com",
            databaseURL: "https://aero-rage-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "aero-rage",
            storageBucket: "aero-rage.firebasestorage.app",
            messagingSenderId: "110632418525",
            appId: "1:110632418525:web:8f33a6404b163f43d36f34"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let displayTimeout; 

        onValue(ref(db, 'current_display'), (snapshot) => {
            const data = snapshot.val();
            
            if (data && data.team) {
                document.getElementById('roundDisplay').innerText = data.round;
                document.getElementById('teamDisplay').innerText = data.team;
                
                // Displays "PTS" instead of "s"
                document.getElementById('scoreDisplay').innerText = data.points + " PTS";
                
                document.getElementById('idleScreen').style.opacity = '0';
                document.getElementById('scoreScreen').style.opacity = '1';

                clearTimeout(displayTimeout);

                displayTimeout = setTimeout(() => {
                    document.getElementById('scoreScreen').style.opacity = '0';
                    document.getElementById('idleScreen').style.opacity = '1';
                }, 5500);
            } else {
                document.getElementById('scoreScreen').style.opacity = '0';
                document.getElementById('idleScreen').style.opacity = '1';
            }
        });
    </script>
</body>
</html>
