<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aero Rage Admin Panel</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #121212; color: white; }
        h2 { text-align: center; color: #00d2d3; text-transform: uppercase; letter-spacing: 2px;}
        select, input, button { padding: 15px; margin: 10px 0; width: 100%; box-sizing: border-box; font-size: 18px; border-radius: 5px; border: none;}
        select, input { background: #222; color: white; border: 1px solid #444;}
        
        #submitBtn { background: #00d2d3; color: #000; font-weight: bold; cursor: pointer; margin-top: 20px;}
        #submitBtn:active { background: #00e5e6; }
        
        #resetBtn { background: #2d3436; color: white; margin-top: 50px; border: 1px solid #ff4757; cursor: pointer;}
        #resetBtn:active { background: #ff4757; }
    </style>
</head>
<body>

    <h2>Control Panel</h2>
    
    <select id="roundSelect">
        <option value="r1">Round 1</option>
        <option value="r2">Round 2</option>
        <option value="r3">Round 3</option>
    </select>

    <select id="teamSelect">
        <option disabled selected value="">Select Team...</option>
        <option value="Aero Dynamic Quintet">Aero Dynamic Quintet</option>
        <option value="Marine Hawks">Marine Hawks</option>
        <option value="Skyfie">Skyfie</option>
        <option value="Switchblade">Switchblade</option>
        <option value="Algo Avengers">Algo Avengers</option>
        <option value="5 wings">5 wings</option>
        <option value="Maydays">Maydays</option>
        <option value="Sky Voyagers">Sky Voyagers</option>
    </select>

    <input type="number" id="teamPoints" placeholder="Enter Points (e.g., 50)">
    
    <button id="submitBtn">Submit Score</button>
    <button id="resetBtn">🧨 Factory Reset Data</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDzxvAi2DksFoVxtr5FMTJ7NQ4C10rgyDM",
            authDomain: "aero-rage.firebaseapp.com",
            databaseURL: "https://aero-rage-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "aero-rage",
            storageBucket: "aero-rage.firebasestorage.app",
            messagingSenderId: "110632418525",
            appId: "1:110632418525:web:8f33a6404b163f43d36f34"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById("submitBtn").addEventListener("click", () => {
            const team = document.getElementById("teamSelect").value;
            const roundKey = document.getElementById("roundSelect").value;
            const roundText = document.getElementById("roundSelect").options[document.getElementById("roundSelect").selectedIndex].text;
            
            // Capture points instead of time
            const points = parseFloat(document.getElementById("teamPoints").value);

            if (team && !isNaN(points)) {
                // Send to Monitor 1
                set(ref(db, 'current_display'), {
                    team: team,
                    round: roundText,
                    points: points
                });

                // Send to Monitor 2
                const teamRef = ref(db, 'teams/' + team);
                get(teamRef).then((snapshot) => {
                    let data = snapshot.exists() ? snapshot.val() : { r1: 0, r2: 0, r3: 0, total: 0 };
                    
                    data[roundKey] = points;
                    data.total = data.r1 + data.r2 + data.r3;

                    set(teamRef, data).then(() => {
                        alert(`Score Locked In for ${team}!`);
                        document.getElementById("teamPoints").value = ''; 
                        document.getElementById("teamSelect").selectedIndex = 0; 
                    });
                });
            } else {
                alert("Please select a team and enter valid points.");
            }
        });

        document.getElementById("resetBtn").addEventListener("click", () => {
            const userIsSure = confirm("🚨 DANGER: Are you absolutely sure you want to delete ALL scores? This cannot be undone!");
            if (userIsSure) {
                set(ref(db, 'teams'), null);
                set(ref(db, 'current_display'), null).then(() => {
                    alert("Database wiped clean. Ready for a new event!");
                }).catch((error) => {
                    alert("Error wiping database: " + error);
                });
            }
        });
    </script>
</body>
</html>
